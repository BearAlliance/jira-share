<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Quickshare Settings</title>
  <style>
    body {
      width: 420px;
      margin: 32px auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #172B4D;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 24px;
      color: #172B4D;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .hint {
      font-size: 12px;
      color: #6B778C;
      margin-bottom: 8px;
    }
    input[type="url"] {
      width: 100%;
      padding: 7px 10px;
      border: 2px solid #DFE1E6;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="url"]:focus {
      border-color: #0052CC;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }
    button {
      padding: 7px 16px;
      background: #0052CC;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
    }
    button:hover {
      background: #0065FF;
    }
    .status {
      font-size: 13px;
    }
    .status-ok  { color: #006644; }
    .status-error { color: #DE350B; }
  </style>
</head>
<body>
  <h1>Quickshare Settings</h1>
  <label for="server-url">Jira Server URL</label>
  <div class="hint">Enter the base URL of your self-hosted Jira instance, e.g. https://jira.example.com or https://jira.example.com/jira. Leave blank to disable.</div>
  <input type="url" id="server-url" placeholder="https://jira.example.com">
  <div class="row">
    <button id="save-btn">Save</button>
    <span class="status" id="status"></span>
  </div>
  <script src="options.js"></script>
</body>
</html>
